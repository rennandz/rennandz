<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="80" y1="80" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#8A2BE2"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bg { fill: #0d1117; }
      .panel { fill: #161b22; stroke: #30363d; stroke-width: 1.5; }
      .center-ring { fill: #161b22; stroke: #00E5FF; stroke-width: 3; }
      .title { fill: #F0F6FC; font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #8B949E; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .node-text { fill: #F0F6FC; font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="500" height="500" rx="26"/>

  <circle cx="250" cy="250" r="170" stroke="#21262d" stroke-width="1.5" fill="none"/>

  <circle cx="250" cy="250" r="170" stroke="url(#ring)" stroke-width="4" stroke-dasharray="10 14" fill="none" filter="url(#glow)">
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="10s"
      repeatCount="indefinite"/>
  </circle>

  <g filter="url(#glow)">
    <circle class="center-ring" cx="250" cy="250" r="82"/>
    <text x="250" y="238" text-anchor="middle" class="title">Rennan</text>
    <text x="250" y="263" text-anchor="middle" class="subtitle">Back + Front</text>
    <text x="250" y="285" text-anchor="middle" class="subtitle">Bots • Automações • Sistemas</text>
  </g>

  <g>
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 250 250"
      to="-360 250 250"
      dur="22s"
      repeatCount="indefinite"/>

    <g transform="translate(250 80)">
      <rect class="panel" x="-48" y="-18" width="96" height="36" rx="18"/>
      <text class="node-text" x="0" y="1">Python</text>
    </g>

    <g transform="translate(370 130)">
      <rect class="panel" x="-48" y="-18" width="96" height="36" rx="18"/>
      <text class="node-text" x="0" y="1">JS</text>
    </g>

    <g transform="translate(420 250)">
      <rect class="panel" x="-48" y="-18" width="96" height="36" rx="18"/>
      <text class="node-text" x="0" y="1">PHP</text>
    </g>

    <g transform="translate(370 370)">
      <rect class="panel" x="-48" y="-18" width="96" height="36" rx="18"/>
      <text class="node-text" x="0" y="1">C#</text>
    </g>

    <g transform="translate(250 420)">
      <rect class="panel" x="-56" y="-18" width="112" height="36" rx="18"/>
      <text class="node-text" x="0" y="1">VB.NET</text>
    </g>

    <g transform="translate(130 370)">
      <rect class="panel" x="-48" y="-18" width="96" height="36" rx="18"/>
      <text class="node-text" x="0" y="1">Git</text>
    </g>

    <g transform="translate(80 250)">
      <rect class="panel" x="-56" y="-18" width="112" height="36" rx="18"/>
      <text class="node-text" x="0" y="1">Java</text>
    </g>

    <g transform="translate(130 130)">
      <rect class="panel" x="-52" y="-18" width="104" height="36" rx="18"/>
      <text class="node-text" x="0" y="1">Bots</text>
    </g>
  </g>
</svg>
